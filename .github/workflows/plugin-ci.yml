name: Plugin CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Validate plugin manifests
        shell: bash
        run: |
          find plugins -mindepth 1 -maxdepth 1 -type d | while read plugin_dir; do
            if [ -f "$plugin_dir/scripts/validate_plugin.py" ]; then
              python "$plugin_dir/scripts/validate_plugin.py" "$plugin_dir" --strict
            fi
          done
